services:
  php:
    build: .
    container_name: symfony_php
    working_dir: /app
    volumes:
      - .:/app

  nginx:
    image: nginx:stable-alpine
    container_name: symfony_nginx
    ports:
      - "8000:80"
    volumes:
      - .:/app
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - php